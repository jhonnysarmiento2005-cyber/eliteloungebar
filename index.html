<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Lounge | Jukebox Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #007BFF; --negro: #0A0A0A; --negro-l: #1A1A1A; --blanco: #F5F5F5; --borde: rgba(255,255,255,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--negro); color: var(--blanco); margin: 0; padding-bottom: 100px; }
        .header { text-align: center; padding: 2rem; background: linear-gradient(to bottom, #001f3f, var(--negro)); border-bottom: 1px solid var(--borde); }
        .bar-name { font-family: 'Syne', sans-serif; font-size: 1.8rem; color: var(--accent); text-transform: uppercase; }
        
        /* Buscador */
        .search-container { padding: 1.5rem; max-width: 500px; margin: 0 auto; }
        input { width: 100%; padding: 1rem; background: var(--negro-l); border: 1px solid var(--borde); border-radius: 12px; color: white; margin-bottom: 0.8rem; box-sizing: border-box; }
        .btn-search { width: 100%; padding: 1rem; background: var(--accent); border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; }

        /* Login */
        .login-box { padding: 2rem; text-align: center; }
        
        /* Resultados */
        .song-card { display: flex; align-items: center; gap: 1rem; padding: 0.8rem; background: var(--negro-l); margin: 0.5rem 1rem; border-radius: 12px; border: 1px solid var(--borde); }
        .song-card img { width: 50px; height: 50px; border-radius: 5px; }
        .song-info { flex: 1; min-width: 0; }
        .song-info strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .add-btn { background: var(--accent); border: none; color: white; padding: 0.5rem; border-radius: 5px; cursor: pointer; }

        /* Player */
        #player-container { width: 100%; max-width: 600px; margin: 0 auto; aspect-ratio: 16/9; background: #000; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; border-top: 1px solid var(--borde); }
        .nav-btn { flex: 1; padding: 1.2rem; border: none; background: none; color: #555; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }
    </style>
</head>
<body>

<div id="view-client" class="view">
    <div class="header"><h1 class="bar-name">Elite Lounge</h1></div>
    <div class="search-container">
        <input id="userName" type="text" placeholder="Tu nombre/mesa">
        <input id="searchInput" type="text" placeholder="Buscar canción...">
        <button class="btn-search" onclick="searchYouTube()">BUSCAR</button>
    </div>
    <div id="results"></div>
</div>

<div id="view-admin-login" class="view" style="display:none">
    <div class="login-box">
        <h2 class="bar-name">Acceso DJ</h2>
        <input id="djUser" type="text" placeholder="Usuario">
        <input id="djPass" type="password" placeholder="Contraseña">
        <button class="btn-search" onclick="checkLogin()">ENTRAR</button>
    </div>
</div>

<div id="view-admin-panel" class="view" style="display:none">
    <div id="player-container"><div id="player"></div></div>
    <div style="padding:1rem; text-align:center;">
        <h3 id="nowPlayingTitle">Música de Ambiente</h3>
        <button onclick="nextSong()" style="background:#444; border:none; color:white; padding:10px 20px; border-radius:20px;">Saltar Canción</button>
    </div>
    <div id="adminQueue"></div>
</div>

<div class="nav">
    <button id="nav-client" class="nav-btn active" onclick="showView('client')">CLIENTE</button>
    <button id="nav-admin" class="nav-btn" onclick="showView('admin')">DJ</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const API_KEY = 'AIzaSyALwvELGjhSvocWqxE01Ga9JiykctZPtyw';
    let queue = [];
    let player;
    let isDjLoggedIn = false;
    
    // Música que suena si nadie pide nada (IDs de YouTube)
    const BACKGROUND_PLAYLIST = ['4NRXx6U8ABQ', '09R8_2nJtjg', 'L0X07zRpr7c']; 
    let currentRadioIdx = 0;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%',
            events: { 'onReady': startRadio, 'onStateChange': onPlayerStateChange }
        });
    }

    function startRadio() {
        if (queue.length === 0) {
            player.loadVideoById(BACKGROUND_PLAYLIST[currentRadioIdx]);
        }
    }

    function onPlayerStateChange(event) {
        if (event.data === 0) { // La canción terminó
            nextSong();
        }
    }

    function nextSong() {
        if (queue.length > 0) {
            const next = queue.shift();
            player.loadVideoById(next.id);
            document.getElementById('nowPlayingTitle').innerText = next.title;
            renderQueue();
        } else {
            currentRadioIdx = (currentRadioIdx + 1) % BACKGROUND_PLAYLIST.length;
            player.loadVideoById(BACKGROUND_PLAYLIST[currentRadioIdx]);
            document.getElementById('nowPlayingTitle').innerText = "Música de Ambiente";
        }
    }

    async function searchYouTube() {
        const query = document.getElementById('searchInput').value;
        if(!query) return;
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(query)}&type=video&key=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById('results').innerHTML = data.items.map(item => `
            <div class="song-card">
                <img src="${item.snippet.thumbnails.default.url}">
                <div class="song-info"><strong>${item.snippet.title}</strong></div>
                <button class="add-btn" onclick="addToQueue('${item.id.videoId}', '${item.snippet.title.replace(/'/g, "")}')">AÑADIR</button>
            </div>
        `).join('');
    }

    function addToQueue(id, title) {
        queue.push({ id, title });
        alert("Añadida a la lista.");
        if (isDjLoggedIn) renderQueue();
    }

    function renderQueue() {
        document.getElementById('adminQueue').innerHTML = queue.map((s, i) => `
            <div class="song-card" style="opacity:0.7">
                <div class="song-info"><strong>${i+1}. ${s.title}</strong></div>
            </div>
        `).join('');
    }

    function checkLogin() {
        // AQUÍ ELIGES TU USUARIO Y CONTRASEÑA
        if(document.getElementById('djUser').value === 'admin' && document.getElementById('djPass').value === 'elite2026') {
            isDjLoggedIn = true;
            showView('admin-panel');
        } else {
            alert("Acceso denegado");
        }
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(e => e.style.display = 'none');
        document.getElementById('nav-client').classList.remove('active');
        document.getElementById('nav-admin').classList.remove('active');

        if(v === 'admin') {
            document.getElementById(isDjLoggedIn ? 'view-admin-panel' : 'view-admin-login').style.display = 'block';
            document.getElementById('nav-admin').classList.add('active');
            if(isDjLoggedIn) renderQueue();
        } else if (v === 'admin-panel') {
            document.getElementById('view-admin-panel').style.display = 'block';
            document.getElementById('nav-admin').classList.add('active');
        } else {
            document.getElementById('view-client').style.display = 'block';
            document.getElementById('nav-client').classList.add('active');
        }
    }
</script>
</body>
</html>
