<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Lounge | Jukebox Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #007BFF; --negro: #0A0A0A; --negro-l: #1A1A1A; --blanco: #F5F5F5; --borde: rgba(255,255,255,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--negro); color: var(--blanco); margin: 0; padding-bottom: 100px; }
        .header { text-align: center; padding: 2rem; background: linear-gradient(to bottom, #001f3f, var(--negro)); border-bottom: 1px solid var(--borde); }
        .bar-name { font-family: 'Syne', sans-serif; font-size: 1.8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .container { padding: 1.5rem; max-width: 600px; margin: 0 auto; }
        input { width: 100%; padding: 1rem; background: var(--negro-l); border: 1px solid var(--borde); border-radius: 12px; color: white; margin-bottom: 0.8rem; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 1rem; background: var(--accent); border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .song-card { display: flex; align-items: center; gap: 1rem; padding: 0.8rem; background: var(--negro-l); margin-bottom: 0.8rem; border-radius: 12px; border: 1px solid var(--borde); }
        .song-card img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .song-info { flex: 1; min-width: 0; }
        .song-info strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.9rem; }
        .add-btn { background: var(--accent); border: none; color: white; padding: 0.6rem; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        #player-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 1rem; }
        .section-title { font-family: 'Syne', sans-serif; color: var(--accent); margin: 1.5rem 0 0.8rem; font-size: 1.1rem; text-transform: uppercase; }
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.95); display: flex; border-top: 1px solid var(--borde); backdrop-filter: blur(10px); z-index: 100; }
        .nav-btn { flex: 1; padding: 1.2rem; border: none; background: none; color: #555; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: var(--accent); border-top: 2px solid var(--accent); }
    </style>
</head>
<body>

<div id="view-client" class="view">
    <div class="header"><h1 class="bar-name">Elite Lounge</h1></div>
    <div class="container">
        <input id="userName" type="text" placeholder="Tu nombre o mesa...">
        <input id="searchInput" type="text" placeholder="¿Qué quieres escuchar?">
        <button class="btn-main" onclick="searchYouTube()">BUSCAR CANCIÓN</button>
        <div id="results"></div>
    </div>
</div>

<div id="view-admin-login" class="view" style="display:none">
    <div class="container" style="text-align:center; padding-top:4rem;">
        <h2 class="bar-name">Panel DJ</h2>
        <input id="djUser" type="text" placeholder="Usuario">
        <input id="djPass" type="password" placeholder="Contraseña">
        <button class="btn-main" onclick="checkLogin()">ENTRAR AL SISTEMA</button>
    </div>
</div>

<div id="view-admin-panel" class="view" style="display:none">
    <div class="header"><h1 class="bar-name">DJ Control</h1></div>
    <div class="container">
        <div id="player-container"><div id="player"></div></div>
        <div class="section-title">En espera</div>
        <div id="adminQueue"></div>
        <div class="section-title">Sugerencias (Relacionadas)</div>
        <div id="recommendations"></div>
    </div>
</div>

<div class="nav">
    <button id="nav-client" class="nav-btn active" onclick="showView('client')">CLIENTE</button>
    <button id="nav-admin" class="nav-btn" onclick="showView('admin')">DJ PANEL</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const SB_URL = 'https://xptwljdevxnuwssmheol.supabase.co';
    const SB_KEY = 'sb_publishable_gExiKl7sio1u8S-knBN95Q_k4UUIxxM';
    const YT_KEY = 'AIzaSyALwvELGjhSvocWqxE01Ga9JiykctZPtyw';
    
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    let player, queue = [], isDj = false, currentVideoId = '';

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%',
            events: { 'onStateChange': (e) => { if(e.data === 0) nextSong(); } }
        });
    }

    async function searchYouTube() {
        const q = document.getElementById('searchInput').value;
        if(!q) return;
        const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(q)}&type=video&key=${YT_KEY}`);
        const data = await res.json();
        document.getElementById('results').innerHTML = data.items.map(i => `
            <div class="song-card">
                <img src="${i.snippet.thumbnails.default.url}">
                <div class="song-info"><strong>${i.snippet.title}</strong></div>
                <button class="add-btn" onclick="sendToSupabase('${i.id.videoId}', '${i.snippet.title.replace(/'/g,"")}')">PEDIR</button>
            </div>
        `).join('');
    }

    async function sendToSupabase(id, title) {
        const user = document.getElementById('userName').value || "Mesa";
        const { error } = await supabaseClient.from('canciones').insert([{ video_id: id, titulo: title, usuario: user }]);
        if(!error) alert("¡Enviado!");
    }

    async function fetchQueue() {
        const { data } = await supabaseClient.from('canciones').select('*').order('created_at', { ascending: true });
        queue = data || [];
        renderQueue();
    }

    function renderQueue() {
        document.getElementById('adminQueue').innerHTML = queue.length ? queue.map((s, i) => `
            <div class="song-card">
                <div class="song-info"><strong>${s.titulo}</strong><small>Por: ${s.usuario}</small></div>
                <button class="add-btn" onclick="playThis('${s.video_id}', '${s.id}')">PLAY</button>
            </div>
        `).join('') : '<p>Esperando pedidos...</p>';
    }

    async function playThis(videoId, dbId) {
        currentVideoId = videoId;
        player.loadVideoById(videoId);
        await supabaseClient.from('canciones').delete().eq('id', dbId);
        fetchQueue();
        getRecommendations(videoId);
    }

    async function nextSong() {
        if(queue.length > 0) {
            playThis(queue[0].video_id, queue[0].id);
        }
    }

    async function getRecommendations(videoId) {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&relatedToVideoId=${videoId}&maxResults=5&key=${YT_KEY}`);
        const data = await res.json();
        document.getElementById('recommendations').innerHTML = data.items.map(i => `
            <div class="song-card" style="background: #111">
                <img src="${i.snippet.thumbnails.default.url}">
                <div class="song-info"><strong>${i.snippet.title}</strong></div>
                <button class="add-btn" style="background:#444" onclick="sendToSupabase('${i.id.videoId}', '${i.snippet.title.replace(/'/g,"")}')">+</button>
            </div>
        `).join('');
    }

    // Escuchar cambios en tiempo real
    supabaseClient.channel('realtime:canciones')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'canciones' }, () => {
        if(isDj) fetchQueue();
    }).subscribe();

    function checkLogin() {
        if(document.getElementById('djUser').value === 'admin' && document.getElementById('djPass').value === 'elite2026') {
            isDj = true;
            showView('admin-panel');
            fetchQueue(); // CARGA INICIAL DE DATOS
        } else { alert("Error"); }
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(e => e.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(v === 'admin') {
            document.getElementById(isDj ? 'view-admin-panel' : 'view-admin-login').style.display = 'block';
            document.getElementById('nav-admin').classList.add('active');
        } else {
            document.getElementById('view-client').style.display = 'block';
            document.getElementById('nav-client').classList.add('active');
        }
    }
</script>
</body>
</html>
